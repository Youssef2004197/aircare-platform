version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aircare_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aircareplatformdev
      POSTGRES_DB: aircare_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: